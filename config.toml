# facet — user configuration
# https://github.com/akira-toriyama/facet
#
# This file is the **single source of truth** for facet's settings.
# Drop it (or your edited copy) at ~/.config/facet/config.toml:
#
#   curl --create-dirs -o ~/.config/facet/config.toml \
#     https://raw.githubusercontent.com/akira-toriyama/facet/main/config.toml
#
# facet only ever READS this file; runtime CLI overrides (e.g.
# `facet --theme=cute`) apply for the current session only. To
# make a change stick, edit the value here and restart facet.
#
# Out-of-range / unknown values are silently clamped to safe
# defaults rather than rejected — a typo can't break the layout.


# -----------------------------------------------------------------
# Startup view
# -----------------------------------------------------------------
# What facet shows when it launches. Comment out (prefix with `#`)
# to start in agent-only mode — facet stays running but draws no
# panel until the CLI asks (`facet --view=grid` etc.).
#
#   "tree"  — translucent always-on-top sidebar listing every
#             workspace and its windows as a tree
#   "grid"  — full-screen overview with DnD between cells
#
# Default for a fresh `curl` install: "tree" (the always-on-top
# sidebar — facet's primary surface; the grid is a full-screen
# overview you summon on demand with `facet --view=grid`).
default_view = "tree"


# -----------------------------------------------------------------
# Color / typography theme
# -----------------------------------------------------------------
# Picks the palette + font for the tree panel, grid overlay, and
# popup menus.
#
#   "terminal" — dark near-black bg, Tokyo-Night-ish accents, mono
#                font. The original look.
#   "cute"     — soft pastel pink, rounded font.
#   "system"   — native vibrancy + dynamic system colors. Adapts
#                to macOS dark/light mode.
#
# CLI override (session only): `facet --theme=cute`
theme = "terminal"


# -----------------------------------------------------------------
# Grid overview
# -----------------------------------------------------------------
[grid]

# Number of columns in the overview grid. The row count is derived
# from the number of workspaces (e.g. 15 workspaces with cols = 5
# → 5/5/5 rows). Clamped 1..12. Built-in fallback (when this file
# is absent entirely) is 4; the install template ships with 5
# because it's the sweet spot for typical workspace counts.
cols = 5

# Where the workspace label sits relative to its cell.
#
#   "up"   — label above each cell (Mission Control style).
#   "down" — label below each cell (Stage Manager / dock style).
label-position = "up"

# Workspace label font size in points. Clamped 8..32. The label
# band height tracks this so larger labels reserve more space.
label-size = 15

# Background ScreenCaptureKit refresh cadence (seconds) that keeps
# grid-view thumbnails warm so `--view=grid` paints immediately
# with real screenshots instead of icon-fallback. 0 disables the
# background refresh entirely (cells still capture on demand the
# first time the grid opens, just with a brief icon flash).
# Clamped 1..60 when set.
thumbnail-refresh-seconds = 4


# -----------------------------------------------------------------
# Virtual-workspace behavior (M5 Phase α)
# -----------------------------------------------------------------
[workspace]

# How facet hides the windows of a workspace you're not currently
# looking at. macOS public APIs cannot truly remove a window from
# the screen, so each method below is a different tradeoff between
# instant switching, visual cleanliness, and crash safety.
#
#   "anchor"   — park each window at a 1×41 px sliver in the
#                bottom-right corner (rift / AeroSpace's approach).
#                Instant. No animation. Still appears in Mission
#                Control (handy if facet crashes — you can pull
#                windows back). Tiny sliver is visible at the corner.
#                Recommended default. The 41 px is macOS's enforced
#                title-bar guarantee — can't go smaller via public APIs.
#
#   "minimize" — AX kAXMinimized. Window goes to the Dock with the
#                genie animation. Cleaner visually but slower; window
#                vanishes from Mission Control. Crash-safe (recover
#                from Dock). Best when "really hide this away" matters
#                more than instant switching.
#
# True hide (gone from Mission Control + Cmd-Tab) is impossible
# via macOS public APIs — facet stays inside that contract.
#
# Unknown values clamp to "anchor".
hide_method = "anchor"

# External shell-hook setup scripts, run once at startup AFTER
# facet's CLI listener (DNC) is live so the script can immediately
# call `facet --workspace=N` / `facet window --move-to=N` /
# `facet status`. Vitest-style: facet itself never persists window
# assignments — this hook is your escape hatch to recreate the
# layout you want on launch.
#
# Use it for, e.g.:
#   - Pin Slack to WS 3, Safari to WS 1 (after they auto-launch).
#   - Pre-open a terminal in WS 2 (via `open -na Terminal`) then
#     move it.
#
# Notes:
#   - Each script must be executable (`chmod +x`).
#   - `~` and `$VAR` / `${VAR}` are expanded.
#   - Fire-and-forget after spawn — a hung script can't stall
#     facet startup. Errors (missing file, non-executable,
#     non-zero exit) surface in `facet status` lastError.
#   - Re-invoked on full restart only, NOT on `facet --reload`.
#   - stdout / stderr is captured into /tmp/facet.log (visible
#     under `facet --debug`).
#
# Default (unset) = no scripts.
# setupFiles = ["~/.config/facet/setup.sh"]

# Tiling (M5 Phase γ) is opt-in per workspace via the CLI; no
# config key. Each WS defaults to "float" so existing users see
# zero behaviour change on upgrade. Opt in with, e.g.:
#
#     facet --workspace=1
#     facet --set-layout=bsp     # this WS now auto-tiles BSP
#     facet --set-layout=stack   # or single-window stack mode
#
# Other tiling-related verbs:
#     facet --retile                       # recompute + reapply layout
#     facet window --toggle-float          # exclude window from layout
#     facet window --toggle-orientation    # rotate parent split (bsp)
#     facet window --cycle-stack=next|prev # rotate stack focus
#
# Frozen scope: bsp / stack / float. master_stack / scrolling /
# traditional are out (see docs/architecture.md "Phase γ frozen
# decisions"). System dialogs / sheets / floating palettes get
# auto-floated on first sight via AX role detection — your
# manual `--toggle-float` is always authoritative once set.
#
# Per-WS mode is *runtime* state (not persisted in config); use
# `setupFiles` above if you want a specific WS to come up in BSP
# at every launch.
