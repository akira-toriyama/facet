name: Release

# Thin caller of glyph's reusable rolling-DRAFT release. A push to main makes
# `glyph release` compute the next version and the notes from each merged
# PR's individual (pre-squash) commits — gitmoji-driven and squash-safe — and
# create/update a single DRAFT release (no tag until you Publish in the UI).
# The verdict + draft logic and the binary that runs it ship together from
# akira-toriyama/glyph at ONE concrete tag (never a moving ref); this file
# supplies only facet's name + install prose. Flipped from the git-cliff era
# akira-toriyama/.github release.yml@v1 (glyph Phase 8 fleet migration,
# t-zck2); cliff.toml is gone — the classification table lives inside the
# glyph binary (`glyph rules`).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview only (no draft; just artifacts)"
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    uses: akira-toriyama/glyph/.github/workflows/release.yml@v0.10.1
    with:
      app: Facet
      dry-run: ${{ github.event.inputs.dry_run == 'true' }}
      install-notes: |
        ## Install

        **Homebrew (build from source):**

        ```sh
        brew install akira-toriyama/tap/facet
        open "$(brew --prefix)/opt/facet/Facet.app"
        curl --create-dirs -o ~/.config/facet/config.toml \
          https://raw.githubusercontent.com/akira-toriyama/facet/main/config.toml
        ```

        **Prebuilt (`Facet.zip` below):** the app is ad-hoc signed
        (not notarized), so macOS quarantines it on download. After
        unzipping:

        ```sh
        xattr -dr com.apple.quarantine /Applications/Facet.app
        open /Applications/Facet.app
        ```

        Then grant **Accessibility** to *facet* (System Settings →
        Privacy & Security → Accessibility), and **Screen Recording**
        if you want grid-view thumbnails.
