name: build

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # Cancel in-flight builds on the same PR / branch when a new push
  # arrives — only the latest commit matters for the required check.
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Least privilege, made explicit — closes zizmor's excessive-permissions
# finding ahead of the fleet-wide zizmor gate (akira-toriyama/.github t-qbp1).
permissions:
  contents: read

jobs:
  build:
    # macos-26: facet's floor is macOS 26 (t-tbar), and `swift test` runs
    # minos-26 binaries a macos-15 host can't load. The 26 runner defaults
    # to Xcode 26.x, which the shared swift-build composite consumes.
    runs-on: macos-26
    # Bounded so a hung `swift build` can't burn 6 h of free macOS minutes.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Shared Swift build (setup-xcode + SPM cache + build + test).
      - uses: akira-toriyama/.github/actions/swift-build@main

      - name: Assemble & ad-hoc sign app bundle
        env:
          CODESIGN_ID: "-"
        run: ./package.sh
