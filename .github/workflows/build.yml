name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      # macos runners default to an older Xcode (Swift 5.x); the package
      # needs the Swift 6 toolchain. Pin the latest stable Xcode.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build (release)
        run: swift build -c release

      # XCTest needs Xcode (CommandLineTools has none) — runs here, not
      # in the CLT-only local dev flow (CLAUDE.md). Covers the pure
      # logic: paletteFor, canonicalStyles, fuzzyMatch, GridMath,
      # TOML parser, FacetConfig, RiftMapper, etc.
      - name: Test
        run: swift test

      - name: Assemble & ad-hoc sign app bundle
        env:
          CODESIGN_ID: "-"
        run: ./package.sh
